# ─────────────────────────────────────────────────────────────────────────────
# Docflow — complete local development stack
#
# Includes MinIO as a local S3-compatible store so no AWS account is needed.
# MinIO console:     http://localhost:9001  (minioadmin / minioadmin)
# API + Swagger UI:  http://localhost/docs
# Qdrant dashboard:  http://localhost:6333/dashboard
#
# Quick start:
#   cp .env.example .env    ← fill in GROQ_API_KEY, HF_API_TOKEN, LANGCHAIN_API_KEY
#   docker compose -f infra/docker-compose.yml up --build -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── FastAPI application server ────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers 1
      --log-level warning
    env_file: ../.env
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped
    mem_limit: 512m
    volumes:
      - app_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 10s
      timeout: 6s
      retries: 6
      start_period: 20s

  # ── Celery worker ─────────────────────────────────────────────────────────
  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    command: >
      celery -A app.workers.tasks.celery_app worker
      --loglevel=info
      --concurrency=2
      --queues=celery
      -n worker@%h
    env_file: ../.env
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped
    mem_limit: 700m
    volumes:
      - app_data:/app/data

  # React frontend
  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    restart: unless-stopped

  # ── Redis — broker + job status store ────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Qdrant — vector store ─────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.1
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  # ── MinIO — local S3-compatible object store ──────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── MinIO init — creates the upload bucket once on first start ────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb local/docflow-uploads --ignore-existing;
        echo 'Bucket docflow-uploads ready.';
      "
    restart: "no"

  # ── Nginx — reverse proxy ─────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped


volumes:
  app_data:
  qdrant_storage:
  minio_data:
